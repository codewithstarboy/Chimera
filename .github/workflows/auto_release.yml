name: Auto Build & Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build & Publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache configure
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          validate-wrappers: false

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Decode Android Keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: echo "$SIGNING_KEY" | base64 --decode > app/my-upload-key.jks

      - name: Disable Daemon & Build APKs
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PATH: my-upload-key.jks
          JAVA_TOOL_OPTIONS: "-Djava.awt.headless=true"
        run: ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Chimera Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ### 🚀 New Release: ${{ github.ref_name }}
            
            This release includes automated builds produced directly from the repository.
            
            **Artifacts attached:**
            - `app-release.apk`: Signed, optimized build for live deployments.
            - `app-debug.apk`: Development build with verbose logging enabled.
          files: |
            app/build/outputs/apk/release/app-release*.apk
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
